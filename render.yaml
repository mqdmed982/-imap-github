services:
  # Backend — Node.js Web Service
  - type: web
    name: inboxious-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inboxious-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://inboxious-frontend.onrender.com
      - key: POLL_INTERVAL
        value: "30"
      # Add your account env vars in the Render dashboard (not here)
      # ACCOUNT_1_NAME, ACCOUNT_1_EMAIL, ACCOUNT_1_PASSWORD, etc.

  # Frontend — Static Site
  - type: web
    name: inboxious-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://inboxious-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: inboxious-db
    databaseName: inboxious
    user: inboxious_user
    plan: free
